<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Showrades · Pass &amp; Play</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══════════ TOKENS (from Showrades Brand Guide) ═══════════ */
:root{
  --sun:oklch(84% .17 82);--sun-dk:oklch(71% .19 78);--sun-lt:oklch(96% .07 88);
  --mint:oklch(79% .14 158);--mint-dk:oklch(62% .15 158);--mint-lt:oklch(95% .06 158);
  --sky:oklch(70% .13 232);--sky-dk:oklch(54% .15 232);--sky-lt:oklch(93% .05 232);
  --coral:oklch(68% .18 28);--coral-dk:oklch(54% .20 26);--coral-lt:oklch(93% .07 28);
  --plum:oklch(73% .14 292);--plum-dk:oklch(57% .16 290);--plum-lt:oklch(93% .06 292);
  --bg:oklch(98.5% .018 88);--surface:oklch(100% 0 0);--surf2:oklch(97.5% .012 88);
  --border:oklch(91% .018 88);--border-dk:oklch(83% .018 88);
  --txt:oklch(19% .012 80);--txt2:oklch(46% .012 80);--txt3:oklch(64% .008 80);
  --fd:'Fredoka',sans-serif;--fn:'Nunito',sans-serif;
  --r1:8px;--r2:14px;--r3:22px;--r4:32px;--rp:9999px;
  --sh1:0 2px 8px oklch(20% 0 0/.07);--sh2:0 4px 20px oklch(20% 0 0/.10);--sh3:0 8px 32px oklch(20% 0 0/.13);
  --spring:cubic-bezier(.34,1.56,.64,1);--smooth:cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--fn);color:var(--txt);
  background:
    radial-gradient(circle at 18% 8%, oklch(96% .07 88) 0%, transparent 46%),
    radial-gradient(circle at 86% 82%, oklch(95% .06 158) 0%, transparent 46%),
    radial-gradient(circle at 92% 12%, oklch(93% .06 292) 0%, transparent 38%),
    oklch(96.5% .01 88);
  -webkit-font-smoothing:antialiased;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
button{font-family:inherit}

/* ═══════════ PHONE FRAME ═══════════ */
#phoneWrap{transform-origin:center center}
.phone{width:336px;height:712px;background:#0e0e16;border-radius:46px;padding:11px;box-shadow:var(--sh3),0 2px 0 oklch(0% 0 0/.4);position:relative}
.screen{width:100%;height:100%;border-radius:36px;overflow:hidden;position:relative;background:var(--bg);display:flex;flex-direction:column}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:118px;height:26px;background:#0e0e16;border-bottom-left-radius:16px;border-bottom-right-radius:16px;z-index:40}
.statusbar{height:44px;flex-shrink:0;display:flex;align-items:flex-end;justify-content:space-between;padding:0 26px 4px;font-size:13px;font-weight:800;color:var(--txt);z-index:30}
.statusbar.lite{color:#fff}
.sb-r{display:flex;gap:6px;align-items:center}
.sb-r svg{display:block}

/* ═══════════ SHARED UI ═══════════ */
.scr-body{flex:1;display:flex;flex-direction:column;padding:12px 20px 22px;min-height:0}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--fn);font-weight:800;font-size:17px;border:none;cursor:pointer;border-radius:var(--rp);padding:16px 28px;line-height:1;white-space:nowrap;transition:transform .2s var(--spring),box-shadow .2s;-webkit-tap-highlight-color:transparent}
.btn:active{transform:translateY(3px)!important}
.btn-sun{background:var(--sun);color:var(--txt);box-shadow:0 5px 0 var(--sun-dk)}
.btn-mint{background:var(--mint);color:#fff;box-shadow:0 5px 0 var(--mint-dk)}
.btn-coral{background:var(--coral);color:#fff;box-shadow:0 5px 0 var(--coral-dk)}
.btn-sky{background:var(--sky);color:#fff;box-shadow:0 5px 0 var(--sky-dk)}
.btn-plum{background:var(--plum);color:#fff;box-shadow:0 5px 0 var(--plum-dk)}
.btn-out{background:var(--surface);color:var(--txt);box-shadow:0 5px 0 var(--border-dk);border:2px solid var(--border-dk)}
.btn-ghost{background:transparent;color:var(--txt2);box-shadow:none}
.btn:not(.btn-ghost):not(:active):hover{transform:translateY(-2px)}
.btn-block{width:100%}
.btn-lg{font-size:20px;padding:19px 28px}
.btn[disabled]{opacity:.4;pointer-events:none;filter:saturate(.4)}
.topbar{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding:4px 0 2px}
.iconbtn{width:42px;height:42px;border-radius:var(--rp);background:var(--surface);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--sh1);color:var(--txt2);transition:transform .15s var(--spring)}
.iconbtn:active{transform:scale(.92)}
.scr-title{font-family:var(--fd);font-size:22px;font-weight:600;white-space:nowrap}

/* screen transition */
.screen>.scr-body{animation:scr-in .36s var(--smooth) both}
@keyframes scr-in{from{transform:translateY(10px)}to{transform:translateY(0)}}
@media(prefers-reduced-motion:reduce){.screen>.scr-body{animation:none}}

/* ═══════════ HOME ═══════════ */
.home{background:var(--sun-lt);background-image:radial-gradient(circle,oklch(84% .17 82/.28) 1.6px,transparent 1.6px);background-size:26px 26px}
.home .scr-body{align-items:center;text-align:center}
.home-logo{font-family:var(--fd);font-size:44px;font-weight:700;letter-spacing:-1px;margin-top:14px}
.home-sub{font-size:15px;color:var(--txt2);margin-top:2px;font-weight:700}
.mimo-stage{flex:1;display:flex;align-items:center;justify-content:center}
.home-actions{width:100%;display:flex;flex-direction:column;gap:14px}
.home-foot{font-size:12px;color:var(--txt3);margin-top:16px;font-weight:700}
.resume-pill{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:800;color:var(--sky-dk);background:var(--sky-lt);padding:7px 14px;border-radius:var(--rp);margin-top:14px;cursor:pointer;border:none}

/* ═══════════ CATEGORY SELECT ═══════════ */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:4px}
.catcard{position:relative;border-radius:var(--r3);padding:15px 10px;text-align:center;cursor:pointer;border:2.5px solid transparent;background:var(--surface);box-shadow:var(--sh1);transition:transform .2s var(--spring)}
.catcard:active{transform:scale(.97)}
.catcard .emo{font-size:30px;display:block;margin-bottom:6px}
.catcard .cn{display:block;font-family:var(--fd);font-size:15px;font-weight:600;line-height:1.1}
.catcard .cc{display:block;font-size:11px;color:var(--txt3);font-weight:700;margin-top:2px}
.catcard.on-mint{background:var(--mint-lt);border-color:var(--mint)}
.catcard.on-sun{background:var(--sun-lt);border-color:var(--sun-dk)}
.catcard.on-sky{background:var(--sky-lt);border-color:var(--sky)}
.catcard.on-coral{background:var(--coral-lt);border-color:var(--coral)}
.catcard.on-plum{background:var(--plum-lt);border-color:var(--plum)}
.catcard .tick{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:var(--rp);display:none;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;animation:pop-in .4s var(--spring)}
.catcard[class*="on-"] .tick{display:flex}
.on-mint .tick{background:var(--mint-dk)}.on-sun .tick{background:var(--sun-dk);color:var(--txt)}
.on-sky .tick{background:var(--sky-dk)}.on-coral .tick{background:var(--coral-dk)}.on-plum .tick{background:var(--plum-dk)}
@keyframes pop-in{0%{transform:scale(.3) rotate(-10deg);opacity:0}65%{transform:scale(1.12) rotate(3deg);opacity:1}100%{transform:scale(1) rotate(0)}}
.field-lab{font-size:11px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--txt3);margin:16px 0 8px}
.field-lab .opt{color:var(--txt3);opacity:.7;letter-spacing:0;text-transform:none;font-weight:700}
.seg{display:flex;gap:8px;background:var(--surf2);border:1.5px solid var(--border);border-radius:var(--rp);padding:4px}
.seg button{flex:1;border:none;background:transparent;font-family:var(--fn);font-weight:800;font-size:14px;color:var(--txt2);padding:10px;border-radius:var(--rp);cursor:pointer;transition:.15s}
.seg button.on{background:var(--sun);color:var(--txt);box-shadow:var(--sh1)}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.modecard{position:relative;border-radius:var(--r3);padding:16px 12px;text-align:center;cursor:pointer;border:2.5px solid var(--border);background:var(--surface);box-shadow:var(--sh1);transition:transform .2s var(--spring)}
.modecard:active{transform:scale(.97)}
.modecard .emo{font-size:30px;display:block;margin-bottom:6px}
.modecard .mn{display:block;font-family:var(--fd);font-size:15px;font-weight:600;line-height:1.1}
.modecard .ma{display:block;font-size:11px;color:var(--txt3);font-weight:800;margin-top:3px}
.modecard.on{background:var(--sky-lt);border-color:var(--sky)}
.modecard.on .ma{color:var(--sky-dk)}
.modecard .tick{position:absolute;top:8px;right:8px;width:20px;height:20px;border-radius:var(--rp);background:var(--sky-dk);color:#fff;display:none;align-items:center;justify-content:center;font-size:12px;font-weight:900}
.modecard.on .tick{display:flex}
.scrollbody{flex:1;overflow-y:auto;min-height:0;margin:0 -4px;padding:0 4px}
.scrollbody::-webkit-scrollbar{width:0}

/* ═══════════ TEAM SETUP ═══════════ */
.teamlist{display:flex;flex-direction:column;gap:11px;margin-top:8px}
.teamedit{display:flex;align-items:center;gap:10px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r2);padding:8px 10px;box-shadow:var(--sh1)}
.teamedit .av{width:38px;height:38px;border-radius:var(--rp);display:flex;align-items:center;justify-content:center;font-size:19px;cursor:pointer;flex-shrink:0;transition:transform .2s var(--spring)}
.teamedit .av:active{transform:scale(.88) rotate(-8deg)}
.teamedit .tfields{flex:1;min-width:0}
.teamedit .tlab{font-size:10px;font-weight:800;letter-spacing:.06em;color:var(--txt3);text-transform:uppercase}
.teamedit .tval{width:100%;border:none;background:transparent;font-family:var(--fd);font-size:16px;font-weight:600;color:var(--txt);min-width:0;outline:none;padding:1px 0;border-bottom:2px solid transparent;transition:border-color .15s}
.teamedit .tval:focus{border-bottom-color:var(--border-dk)}
.teamedit .edit{color:var(--txt3);flex-shrink:0;display:flex}
.teamedit .rm{width:28px;height:28px;border-radius:var(--rp);border:none;background:var(--surf2);color:var(--txt3);font-size:14px;font-weight:900;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.teamedit .rm:hover{background:var(--coral-lt);color:var(--coral-dk)}
.addteam{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:2px dashed var(--border-dk);background:transparent;border-radius:var(--r3);padding:14px;font-family:var(--fd);font-size:16px;font-weight:600;color:var(--txt2);cursor:pointer;margin-top:11px;transition:.15s}
.addteam:hover{background:var(--surf2);border-color:var(--txt3)}
.addteam[disabled]{opacity:.4;pointer-events:none}
.setup-hint{font-size:12px;color:var(--txt3);text-align:center;font-weight:700;margin-top:10px}

/* ═══════════ PASS SCREEN ═══════════ */
.pass{transition:background .4s}
.pass .scr-body{align-items:center;text-align:center;justify-content:center;gap:0}
.pass-round{font-size:12px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--txt3)}
.pass-lead{font-size:17px;font-weight:700;color:var(--txt2);margin-top:auto}
.pass-av{width:96px;height:96px;border-radius:var(--rp);display:flex;align-items:center;justify-content:center;font-size:50px;margin:16px auto 12px;box-shadow:var(--sh2)}
.pass-team{font-family:var(--fd);font-size:34px;font-weight:700;line-height:1.05}
.pass-mimo{margin:24px 0 6px}
.pass-cta{width:100%;margin-top:auto}
.pass-sub{font-size:13px;color:var(--txt3);font-weight:700;margin-top:14px}

/* ═══════════ PLAY SCREEN ═══════════ */
.game{background:var(--sun);transition:background .25s}
.game.pic{background:var(--sky)}
.game.urgent{background:var(--coral-lt)}
.game .scr-body{padding:10px 18px 20px}
.gtop{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px}
.team-pill{display:flex;align-items:center;gap:8px;background:oklch(100% 0 0/.55);border-radius:var(--rp);padding:5px 14px 5px 5px;min-width:0}
.team-pill .av{width:30px;height:30px;border-radius:var(--rp);background:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.team-pill .tn{font-family:var(--fd);font-size:14px;font-weight:600;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
.team-pill .ts{font-size:9px;font-weight:800;color:var(--txt2);letter-spacing:.05em}
.modetag{font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;background:oklch(100% 0 0/.55);border-radius:var(--rp);padding:6px 12px;color:var(--txt);flex-shrink:0}
.scorebadge{font-family:var(--fd);font-size:16px;font-weight:600;background:oklch(100% 0 0/.55);border-radius:var(--rp);padding:8px 16px;flex-shrink:0;transition:transform .25s var(--spring)}
.scorebadge.bump{transform:scale(1.28)}
.timer{width:96px;height:96px;position:relative;display:flex;align-items:center;justify-content:center;margin:12px auto 0;flex-shrink:0}
.timer svg{position:absolute;inset:0}
.timer .ring{transition:stroke-dashoffset 1s linear,stroke .3s}
.timer-n{font-family:var(--fd);font-size:36px;font-weight:600;color:var(--txt)}
.timer.urgent{animation:tpulse .6s var(--spring) infinite}
.timer.urgent .timer-n{color:var(--coral-dk)}
@keyframes tpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@media(prefers-reduced-motion:reduce){.timer.urgent{animation:none}}
.wordcard{flex:1;background:#fff;border-radius:var(--r4);box-shadow:var(--sh2);margin:14px 0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:22px;min-height:0}
.wc-cat{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:5px 13px;border-radius:var(--rp);margin-bottom:16px}
.wc-word{font-family:var(--fd);font-size:44px;font-weight:700;line-height:1.04;text-wrap:balance}
.wc-hint{font-size:12px;color:var(--txt3);margin-top:14px;font-weight:700}
.wcat-mint{color:var(--mint-dk);background:var(--mint-lt)}
.wcat-sun{color:var(--sun-dk);background:var(--sun-lt)}
.wcat-sky{color:var(--sky-dk);background:var(--sky-lt)}
.wcat-coral{color:var(--coral-dk);background:var(--coral-lt)}
.wcat-plum{color:var(--plum-dk);background:var(--plum-lt)}
.pic-frame{flex:1;display:flex;align-items:center;justify-content:center;width:100%;background:linear-gradient(160deg,var(--sky-lt),var(--surface));border-radius:var(--r3);min-height:0;margin:14px 0 6px}
.pic-inner{display:flex;flex-direction:column;align-items:center;gap:10px}
.pic-emo{font-size:148px;line-height:1;filter:drop-shadow(0 8px 16px oklch(20% 0 0/.15))}
.pic-word{font-family:var(--fd);font-size:30px;font-weight:700;color:var(--txt);letter-spacing:-.5px;line-height:1}
.a-flip{animation:card-flip .42s var(--smooth)}
@keyframes card-flip{0%{transform:perspective(600px) rotateY(0)}50%{transform:perspective(600px) rotateY(86deg);opacity:.4}100%{transform:perspective(600px) rotateY(0);opacity:1}}
.floatpt{position:absolute;left:50%;top:46%;transform:translate(-50%,0);font-family:var(--fd);font-size:38px;font-weight:700;color:var(--mint-dk);pointer-events:none;z-index:50;animation:floatpt 0.8s var(--smooth) forwards}
@keyframes floatpt{0%{opacity:0;transform:translate(-50%,10px) scale(.6)}30%{opacity:1;transform:translate(-50%,-6px) scale(1.1)}100%{opacity:0;transform:translate(-50%,-54px) scale(1)}}
.game-actions{display:flex;gap:12px;flex-shrink:0}
.game-actions .btn{flex:1}
.turnmeta{text-align:center;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--txt2);opacity:.7;margin-top:8px}

/* ═══════════ SCORE / ROUND-END / GAME OVER ═══════════ */
.score{background:var(--mint-lt);background-image:radial-gradient(circle,oklch(79% .14 158/.22) 1.6px,transparent 1.6px);background-size:26px 26px}
.gameover{background:var(--mint-lt);background-image:radial-gradient(circle,oklch(79% .14 158/.22) 1.6px,transparent 1.6px);background-size:26px 26px}
.score .scr-body,.gameover .scr-body{text-align:center}
.win-tag{font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--mint-dk);margin-top:6px}
.gameover .win-tag{color:var(--mint-dk)}
.win-h{font-family:var(--fd);font-size:30px;font-weight:700;line-height:1.05;margin-top:4px;text-wrap:balance}
.score-mimo{display:flex;justify-content:center;margin:4px 0}
.board{display:flex;flex-direction:column;gap:9px;margin-top:6px;text-align:left}
.team-row{display:flex;align-items:center;gap:12px;background:var(--surface);border:2px solid var(--border);border-radius:var(--r3);padding:12px 16px;box-shadow:var(--sh1);transition:transform .3s var(--spring)}
.team-row.lead{border-color:var(--mint);box-shadow:var(--sh2),0 0 0 3px var(--mint-lt)}
.gameover .team-row.lead{border-color:var(--mint);box-shadow:var(--sh2),0 0 0 3px var(--mint-lt)}
.tr-rank{font-family:var(--fd);font-size:17px;font-weight:700;color:var(--txt3);width:16px;flex-shrink:0}
.tr-av{width:42px;height:42px;border-radius:var(--rp);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.tr-name{font-family:var(--fd);font-size:17px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-sub{font-size:11px;color:var(--txt3);font-weight:700;margin-top:1px}
.tr-pts{font-family:var(--fd);font-size:28px;font-weight:700;margin-left:auto;flex-shrink:0;white-space:nowrap;padding-left:8px}
.tr-pts span{font-size:12px;color:var(--txt3)}
.score-actions{display:flex;flex-direction:column;gap:11px;margin-top:auto;padding-top:16px}
.target-line{font-size:12px;font-weight:700;color:var(--txt3);margin-top:10px}
.target-line b{color:var(--txt2)}

/* confetti */
.confetti{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:20}
.cf{position:absolute;top:-12px;width:9px;height:14px;border-radius:2px;opacity:.9;animation:cfall linear forwards}
@keyframes cfall{to{transform:translateY(780px) rotate(720deg);opacity:.4}}
@media(prefers-reduced-motion:reduce){.cf{display:none}}

/* rules overlay */
.overlay{position:absolute;inset:0;background:oklch(20% 0 0/.45);z-index:60;display:flex;align-items:flex-end;border-radius:36px;overflow:hidden;animation:fade .25s both}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{background:var(--surface);width:100%;border-top-left-radius:var(--r4);border-top-right-radius:var(--r4);padding:26px 24px 24px;animation:sheetup .36s var(--spring) both}
@keyframes sheetup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet h3{font-family:var(--fd);font-size:24px;font-weight:700;margin-bottom:14px}
.rule{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px}
.rule .rn{width:28px;height:28px;border-radius:var(--rp);background:var(--sun);color:var(--txt);font-family:var(--fd);font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rule p{font-size:14px;color:var(--txt2);line-height:1.4;font-weight:600}

.mimo-anim-bounce{animation:m-bounce 1.6s var(--spring) infinite}
.mimo-anim-float{animation:m-float 3s ease-in-out infinite}
.mimo-anim-cheer{animation:m-cheer 1.1s var(--spring) infinite}
@keyframes m-bounce{0%,100%{transform:translateY(0) scale(1)}30%{transform:translateY(-14px) scale(1.04,.96)}60%{transform:translateY(-5px) scale(.99,1.01)}80%{transform:translateY(-2px)}}
@keyframes m-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes m-cheer{0%,100%{transform:translateY(0) rotate(0)}25%{transform:translateY(-11px) rotate(-4deg)}75%{transform:translateY(-11px) rotate(4deg)}}
@media(prefers-reduced-motion:reduce){.mimo-anim-bounce,.mimo-anim-float,.mimo-anim-cheer{animation:none}}
</style>
</head>
<body>
<div id="phoneWrap">
  <div class="phone">
    <div class="notch"></div>
    <div id="screen" class="screen"></div>
  </div>
</div>

<script>

function resetGame(){ S = defaultState(); save(); }

/* ---------- deck ---------- */
function buildDeck(){
  let pool=[];
  S.settings.cats.forEach(k=>{
    WORDS[k].forEach(w=> pool.push({word:w, cat:k, color:CATS[k].color, catemoji:CATS[k].emoji, wemoji:EMO[w]||CATS[k].emoji, catname:CATS[k].name}));
  });
  // shuffle
  for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
  S.deck=pool; S.deckIndex=0;
}
function currentCard(){
  if(!S.deck.length) buildDeck();
  if(S.deckIndex>=S.deck.length){ // reshuffle, keep going
    buildDeck();
  }
  return S.deck[S.deckIndex];
}

function render(){
  if(timer){ clearInterval(timer); timer=null; }
  const el=document.getElementById('screen');
  const lite = false;
  let body='';
  switch(S.screen){
    case 'home': body=screenHome(); break;
    case 'categories': body=screenCategories(); break;
    case 'setup': body=screenSetup(); break;
    case 'pass': body=screenPass(); break;
    case 'play': body=screenPlay(); break;
    case 'roundend': body=screenRoundEnd(); break;
    case 'gameover': body=screenGameOver(); break;
  }
  let cls = CLS[S.screen]||'';
  if(S.screen==='play' && S.settings.mode==='picture') cls+=' pic';
  if(S.screen==='play' && S.timeLeft<=10) cls+=' urgent';
  el.className='screen '+cls;
  el.setAttribute('data-screen-label', labelFor(S.screen));
  el.innerHTML = statusbar(lite) + body + (S.overlay==='rules'?rulesOverlay():'');
  if(S.screen==='play') startTimer();
  if(S.screen==='gameover') spawnConfetti();
}
function labelFor(s){return {home:'Home',categories:'Category Select',setup:'Set Up',pass:'Pass the Phone',play:'Active Round',roundend:'Round Score',gameover:'Winner'}[s]||s;}

function go(screen){ S.screen=screen; S.overlay=null; save(); render(); }

/* ═══════════════════ FLOW / ACTIONS ═══════════════════ */
function openRules(){ S.overlay='rules'; render(); }
function closeOverlay(){ S.overlay=null; render(); }

function newGame(){
  // keep last settings/teams if present, else defaults
  if(!S.teams || S.teams.length<2) S=defaultState();
  S.teams.forEach(t=>{t.score=0;t.roundGain=0;});
  S.round=1; S.currentTeam=0; S.deck=[]; S.deckIndex=0; S.overlay=null;
  go('setup');
}

function toggleCat(k){
  const i=S.settings.cats.indexOf(k);
  if(i>=0){ if(S.settings.cats.length>1) S.settings.cats.splice(i,1); }
  else S.settings.cats.push(k);
  save(); render();
}
function setDiff(d){ S.settings.difficulty=d; save(); render(); }
function setLen(n){ S.settings.roundLength=n; save(); render(); }
function setMode(m){ S.settings.mode=m; save(); render(); }
function setStyle(s){ S.settings.style=s; save(); render(); }

function cycleAvatar(i){
  const used=S.teams.map(t=>t.emoji);
  let idx=AVATARS.indexOf(S.teams[i].emoji);
  for(let n=1;n<=AVATARS.length;n++){
    const cand=AVATARS[(idx+n)%AVATARS.length];
    if(!used.includes(cand)){ S.teams[i].emoji=cand; break; }
  }
  save(); render();
}
function renameTeam(i,v){ S.teams[i].name=v; save(); } // no re-render: keep input focus
function addTeam(){
  if(S.teams.length>=6) return;
  const used=S.teams.map(t=>t.emoji);
  const emoji=AVATARS.find(a=>!used.includes(a))||'🐾';
  const color=TEAM_COLORS[S.teams.length%TEAM_COLORS.length];
  S.teams.push({name:'Team '+(S.teams.length+1), emoji, color, score:0, roundGain:0});
  save(); render();
}
function removeTeam(i){ if(S.teams.length<=2) return; S.teams.splice(i,1); save(); render(); }

function startGame(){
  S.teams.forEach(t=>{ if(!t.name.trim()) t.name='Team'; t.score=0; t.roundGain=0; });
  S.round=1; S.currentTeam=0; buildDeck(); go('pass');
}

function beginTurn(){
  S.timeLeft=S.settings.roundLength;
  S.teams[S.currentTeam].roundGain=0;
  S.screen='play'; save(); render();
}

function startTimer(){
  if(timer) clearInterval(timer);
  timer=setInterval(()=>{
    S.timeLeft--;
    if(S.timeLeft<0){ S.timeLeft=0; clearInterval(timer); timer=null; endTurn(); return; }
    updateTimerUI();
    save();
  },1000);
}
function updateTimerUI(){
  const num=document.getElementById('timerNum');
  const ring=document.getElementById('timerRing');
  const tEl=document.getElementById('timerEl');
  if(!num||!ring) return;
  num.textContent=S.timeLeft;
  const C=358.14, total=S.settings.roundLength;
  ring.setAttribute('stroke-dashoffset', C*(1-S.timeLeft/total));
  const urgent=S.timeLeft<=10;
  tEl.classList.toggle('urgent',urgent);
  ring.setAttribute('stroke', urgent?'var(--coral)':'#fff');
  document.getElementById('screen').classList.toggle('urgent',urgent);
}

function onCorrect(){
  const t=S.teams[S.currentTeam];
  t.score++; t.roundGain++;
  floatPoint();
  bumpScore();
  S.deckIndex++;
  advanceCard();
  save();
}
function onSkip(){
  S.deckIndex++;
  advanceCard();
  save();
}
function advanceCard(){
  const card=currentCard();
  const wc=document.getElementById('wordCard');
  if(!wc) return;
  wc.classList.remove('a-flip'); void wc.offsetWidth; wc.classList.add('a-flip');
  // swap content at flip midpoint
  setTimeout(()=>{ wc.innerHTML=cardInner(card); },150);
}
function bumpScore(){
  const b=document.getElementById('liveScore');
  if(!b) return;
  b.innerHTML=`${S.teams[S.currentTeam].score} <span style="font-size:11px">pts</span>`;
  b.classList.remove('bump'); void b.offsetWidth; b.classList.add('bump');
  setTimeout(()=>b.classList.remove('bump'),280);
}
function floatPoint(){
  const sb=document.getElementById('screen');
  const el=document.createElement('div');
  el.className='floatpt'; el.textContent='+1';
  sb.appendChild(el);
  setTimeout(()=>el.remove(),850);
}

function endTurn(){
  if(timer){clearInterval(timer);timer=null;}
  if(S.currentTeam < S.teams.length-1){
    S.currentTeam++;
    S.screen='pass';
  } else {
    // round complete
    const max=Math.max(...S.teams.map(t=>t.score));
    S.screen = (max>=WIN_TARGET) ? 'gameover' : 'roundend';
  }
  save(); render();
}

function nextRound(){
  S.round++; S.currentTeam=0;
  S.teams.forEach(t=>t.roundGain=0);
  go('pass');
}
function endGame(){ S.screen='gameover'; save(); render(); }
function quitHome(){ resetGame(); render(); }

/* ═══════════════════ confetti ═══════════════════ */
function spawnConfetti(){
  const host=document.getElementById('confetti');
  if(!host) return;
  const colors=['var(--sun)','var(--mint)','var(--sky)','var(--coral)','var(--plum)'];
  for(let i=0;i<46;i++){
    const p=document.createElement('div');
    p.className='cf';
    p.style.left=Math.random()*100+'%';
    p.style.background=colors[i%colors.length];
    p.style.animationDuration=(2.4+Math.random()*1.8)+'s';
    p.style.animationDelay=(Math.random()*1.2)+'s';
    p.style.transform=`rotate(${Math.random()*360}deg)`;
    host.appendChild(p);
  }
}

/* ═══════════════════ helpers ═══════════════════ */
function allZero(){ return S.teams.every(t=>t.score===0); }
function escapeHtml(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function escapeAttr(s){ return escapeHtml(s); }

/* ═══════════════════ fit to viewport ═══════════════════ */
function fit(){
  const wrap=document.getElementById('phoneWrap');
  const pad=24;
  const s=Math.min(1,(innerWidth-pad)/358,(innerHeight-pad)/734);
  wrap.style.transform=`scale(${s})`;
}
window.addEventListener('resize',fit);

/* ═══════════════════ boot ═══════════════════ */
// on reload mid-play, resume cleanly
if(S.screen==='play' && (typeof S.timeLeft!=='number')) S.timeLeft=S.settings.roundLength;
fit();
render();
</script>
</body>
</html>
