<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Showrades · Winner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="showrades.css">
</head>
<body>
<div class="screen score" data-screen-label="Game Over">
  <div class="safetop"></div>
  <div class="scr-body">
    <p class="win-tag">Game Over · reached 15 first</p>
    <h1 class="win-h">The Lions win! 🎉</h1>
    <div class="score-mimo">
      <svg class="anim-cheer" width="122" height="156" viewBox="0 0 90 118" fill="none" role="img" aria-label="Mimo cheering">
        <ellipse cx="45" cy="116" rx="26" ry="4" fill="#c8960a" opacity=".2"/>
        <g transform="translate(0,-5)">
          <path d="M45 7C22 7 11 24 9 48S17 99 45 100 79 71 81 48 68 7 45 7Z" fill="#f7c948"/>
          <ellipse cx="45" cy="64" rx="21" ry="26" fill="#fef5cc" opacity=".5"/>
          <ellipse cx="25" cy="11" rx="7" ry="12" fill="#f7c948" transform="rotate(-18 25 11)"/>
          <ellipse cx="65" cy="11" rx="7" ry="12" fill="#f7c948" transform="rotate(18 65 11)"/>
          <circle cx="31" cy="41" r="13" fill="white"/><circle cx="31" cy="41" r="8" fill="#1a1a2e"/><circle cx="35" cy="37" r="3" fill="white"/>
          <circle cx="59" cy="41" r="13" fill="white"/><circle cx="59" cy="41" r="8" fill="#1a1a2e"/><circle cx="63" cy="37" r="3" fill="white"/>
          <path d="M30 62Q45 80 60 62" fill="#1a1a2e"/>
          <ellipse cx="45" cy="72" rx="9" ry="5" fill="#e05c6b"/>
          <path d="M9 44Q1 28 9 18Q17 12 22 22Q18 32 12 43Z" fill="#f7c948"/>
          <path d="M81 44Q89 28 81 18Q73 12 68 22Q72 32 78 43Z" fill="#f7c948"/>
        </g>
        <ellipse cx="33" cy="106" rx="13" ry="7" fill="#c8960a"/>
        <ellipse cx="57" cy="106" rx="13" ry="7" fill="#c8960a"/>
      </svg>
    </div>
    <div class="board">
      <div class="team-row lead">
        <span class="tr-rank">1</span>
        <div class="tr-av" style="background:var(--sun-lt)">🦁</div>
        <div><div class="tr-name">The Lions 👑</div><div class="tr-sub">Team A</div></div>
        <div class="tr-pts">15 <span>pts</span></div>
      </div>
      <div class="team-row">
        <span class="tr-rank">2</span>
        <div class="tr-av" style="background:var(--sky-lt)">🐬</div>
        <div><div class="tr-name">The Dolphins</div><div class="tr-sub">Team B</div></div>
        <div class="tr-pts">11 <span>pts</span></div>
      </div>
    </div>
    <p class="target-line">23 cards played · 4 categories</p>
    <div class="score-actions">
      <a class="btn btn-sky btn-block btn-lg" href="02-set-up.html">Play Again</a>
      <a class="btn btn-out btn-block" href="01-home.html">Back to Home</a>
    </div>
  </div>
</div>
</body>
</html>
