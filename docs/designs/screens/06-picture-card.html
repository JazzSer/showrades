<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Showrades · Picture Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="showrades.css">
</head>
<body>
<div class="screen game pic" data-screen-label="Active Game · Picture">
  <div class="safetop"></div>
  <div class="scr-body">
    <div class="gtop">
      <div class="team-pill">
        <div class="av">🐬</div>
        <div><div class="tn">The Dolphins</div><div class="ts">YOUR TURN</div></div>
      </div>
      <div class="gtop-r">
        <div class="modetag">🖼️ Picture</div>
        <a class="endbtn" href="07-end-confirm.html" title="End game early">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="5" width="14" height="14" rx="2.5"/></svg>End
        </a>
      </div>
    </div>
    <div class="goalbar">
      <div class="track"><div class="fill" style="width:44%"></div></div>
      <span class="gtxt">♾️ Card 12 / 27</span>
    </div>
    <div class="timer">
      <svg viewBox="0 0 130 130">
        <circle cx="65" cy="65" r="57" fill="none" stroke="oklch(100% 0 0/.4)" stroke-width="8"/>
        <circle cx="65" cy="65" r="57" fill="none" stroke="#fff" stroke-width="8" stroke-dasharray="358.1" stroke-dashoffset="160" stroke-linecap="round" style="transform-origin:65px 65px;transform:rotate(-90deg)"/>
      </svg>
      <span class="timer-n">17</span>
    </div>
    <div class="pic-frame">
      <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
        <div class="pic-emo">🐘</div>
        <p class="pic-word">Elephant</p>
      </div>
    </div>
    <div class="game-actions">
      <a class="btn btn-coral" href="08-round-score.html">✗ Pass</a>
      <a class="btn btn-mint" href="08-round-score.html">✓ Got It</a>
    </div>
  </div>
</div>
</body>
</html>
